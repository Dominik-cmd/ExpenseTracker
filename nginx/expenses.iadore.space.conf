# Nginx config for expenses.iadore.space
# Place this file at: /etc/nginx/sites-available/expenses.iadore.space
# Then: ln -s /etc/nginx/sites-available/expenses.iadore.space /etc/nginx/sites-enabled/
#
# SSL certificates are managed by certbot:
#   certbot --nginx -d expenses.iadore.space
#
# After certbot runs it will modify this file to add the ssl_certificate lines.
# You can also run certbot first on the HTTP-only block, then it upgrades to HTTPS.

server {
    listen 80;
    server_name expenses.iadore.space;

    # Allow certbot ACME challenges through
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name expenses.iadore.space;

    # Managed by certbot - these paths will exist after: certbot --nginx -d expenses.iadore.space
    ssl_certificate     /etc/letsencrypt/live/expenses.iadore.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/expenses.iadore.space/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    # Increase body size limit for SMS webhook payloads (default 1m is fine but explicit)
    client_max_body_size 2m;

    # ── API (/api/* and /hubs/* for SignalR if added later) ──────
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Frontend (Angular dev server) ────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:4200;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket support (Angular HMR / live reload)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 3600s;
    }
}
