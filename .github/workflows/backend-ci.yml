name: .NET Backend CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore ExpenseTracker.slnx

    - name: Verify Formatting
      run: dotnet format ExpenseTracker.slnx --verify-no-changes
      
    - name: Build
      run: dotnet build ExpenseTracker.slnx --no-restore --configuration Release

    - name: Test
      run: dotnet test ExpenseTracker.slnx --no-build --configuration Release --verbosity normal
