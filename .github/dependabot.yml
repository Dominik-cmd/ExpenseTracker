version: 2
updates:
  # Maintain dependencies for .NET
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"

  # Maintain dependencies for npm (Angular)
  - package-ecosystem: "npm"
    directory: "/expensetracker.client"
    schedule:
      interval: "weekly"

  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
