<div class="app-shell" [class.has-sidebar]="isAuthenticated()" [class.sidebar-collapsed]="sidebarCollapsed()">
  <!-- Persistent sidebar -->
  <aside class="app-sidebar" *ngIf="isAuthenticated()">
    <div class="sidebar-header">
      <div class="sidebar-brand" *ngIf="!sidebarCollapsed()">
        <div class="text-sm text-color-secondary">Signed in as</div>
        <div class="font-semibold">{{ username() }}</div>
      </div>
      <p-button
        [icon]="sidebarCollapsed() ? 'pi pi-angle-right' : 'pi pi-angle-left'"
        [text]="true"
        severity="secondary"
        (onClick)="toggleSidebar()"></p-button>
    </div>

    <nav class="nav-links">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-link"
        [title]="sidebarCollapsed() ? item.label : ''">
        <i [class]="item.icon"></i>
        <span class="nav-label" *ngIf="!sidebarCollapsed()">{{ item.label }}</span>
      </a>
    </nav>
  </aside>

  <!-- Main area -->
  <div class="app-main">
    <header class="app-topbar">
      <div class="topbar-left">
        <div>
          <div class="app-title">Expense Tracker</div>
          <div class="app-subtitle">
            {{ isAuthenticated() ? 'Personal finance command center' : 'Secure sign in' }}
          </div>
        </div>
      </div>

      <div class="topbar-actions">
        <div class="theme-toggle">
          <i class="pi" [ngClass]="darkMode() ? 'pi-moon' : 'pi-sun'"></i>
          <p-toggleSwitch [ngModel]="darkMode()" (ngModelChange)="darkMode.set($event)"></p-toggleSwitch>
        </div>

        <p-button
          *ngIf="isAuthenticated()"
          label="Logout"
          icon="pi pi-sign-out"
          severity="secondary"
          [outlined]="true"
          (onClick)="logout()"></p-button>
      </div>
    </header>

    <main class="app-content">
      <router-outlet></router-outlet>
    </main>
  </div>

  <p-toast position="top-right"></p-toast>
  <p-confirmDialog [style]="{ width: '28rem' }"></p-confirmDialog>
</div>
