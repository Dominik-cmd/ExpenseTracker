services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: expensetracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/ExpenseTracker.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      DB_CONNECTION_STRING: "Host=postgres;Port=5432;Database=expensetracker;Username=postgres;Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      INITIAL_PASSWORD: ${INITIAL_PASSWORD:-ChangeMeNow!}
      DATA_PROTECTION_KEY_PATH: /app/data-protection-keys
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:4200}
    volumes:
      - dpkeys:/app/data-protection-keys
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./expensetracker.client
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    depends_on:
      - api

volumes:
  pgdata:
  dpkeys:
